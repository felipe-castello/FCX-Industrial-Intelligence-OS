services:
  postgres:
    image: timescale/timescaledb:2.15.3-pg16
    container_name: fcx-production-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - postgres_production_data:/var/lib/postgresql/data
      - ./backups/postgres:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: &default-logging
      driver: json-file
      options:
        max-size: "20m"
        max-file: "7"
    networks:
      - fcx_backend

  redis:
    image: redis:7.2-alpine
    container_name: fcx-production-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "${REDIS_MAXMEMORY:-512mb}", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_production_data:/data
      - ./backups/redis:/backups
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    logging: *default-logging
    networks:
      - fcx_backend

  emqx:
    image: emqx/emqx:5.7.2
    container_name: fcx-production-emqx
    restart: unless-stopped
    environment:
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USER}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD}
      EMQX_NODE__COOKIE: ${EMQX_NODE_COOKIE}
      TZ: ${TZ:-America/Sao_Paulo}
    ports:
      - "${MQTT_PUBLIC_BIND:-0.0.0.0}:1883:1883"
    volumes:
      - emqx_production_data:/opt/emqx/data
      - emqx_production_log:/opt/emqx/log
    healthcheck:
      test: ["CMD-SHELL", "emqx ctl status >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 45s
    logging: *default-logging
    networks:
      - fcx_backend
      - fcx_public

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: fcx-production-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MQTT_URL: ${MQTT_URL}
      MQTT_TELEMETRY_TOPIC: ${MQTT_TELEMETRY_TOPIC:-fcx/telemetry/+}
      JWT_SECRET: ${JWT_SECRET}
      API_KEY: ${API_KEY}
      SECURITY_AUTH_ENABLED: ${SECURITY_AUTH_ENABLED:-true}
      REQUEST_BODY_LIMIT: ${REQUEST_BODY_LIMIT:-1mb}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-600}
      CORS_ORIGIN: ${CORS_ORIGIN}
      RUN_SEED: ${RUN_SEED:-false}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      NANGO_SECRET_KEY: ${NANGO_SECRET_KEY:-}
      NANGO_HOST: ${NANGO_HOST:-}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-true}
      FCX_ENV: ${FCX_ENV:-production}
      FCX_MODE: ${FCX_MODE:-modular}
      FCX_RISK_MODE: ${FCX_RISK_MODE:-conservative}
      ENABLE_AGENT_SKILLS: ${ENABLE_AGENT_SKILLS:-false}
      ENABLE_LIBRECHAT: ${ENABLE_LIBRECHAT:-false}
      ENABLE_LANGCHAIN: ${ENABLE_LANGCHAIN:-true}
      ENABLE_NANGO: ${ENABLE_NANGO:-false}
      ENABLE_QUANTDINGER: ${ENABLE_QUANTDINGER:-false}
      ENABLE_UNDERSTAND_ANYTHING: ${ENABLE_UNDERSTAND_ANYTHING:-false}
      MODBUS_HOST: ${MODBUS_HOST:-127.0.0.1}
      MODBUS_PORT: ${MODBUS_PORT:-502}
      MODBUS_UNIT_ID: ${MODBUS_UNIT_ID:-1}
      CAREL_BOSS_URL: ${CAREL_BOSS_URL:-http://localhost:8081}
      CAREL_BOSS_TOKEN: ${CAREL_BOSS_TOKEN:-change_me}
      SITRAD_PRO_URL: ${SITRAD_PRO_URL:-http://localhost:8082}
      SITRAD_PRO_TOKEN: ${SITRAD_PRO_TOKEN:-change_me}
      THINGSBOARD_URL: ${THINGSBOARD_URL:-http://localhost:8080}
      THINGSBOARD_TOKEN: ${THINGSBOARD_TOKEN:-change_me}
      FCX_GATEWAY_URL: ${FCX_GATEWAY_URL:-http://localhost:8090}
      TZ: ${TZ:-America/Sao_Paulo}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      emqx:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - fcx_backend
      - fcx_public

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${PUBLIC_API_URL}
    container_name: fcx-production-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - fcx_public

  fcx-workers:
    build:
      context: ./fcx-6.0
      dockerfile: Dockerfile.worker
    container_name: fcx-production-workers
    restart: unless-stopped
    profiles: ["workers"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      FCX_ENV: ${FCX_ENV:-production}
      FCX_MODE: ${FCX_MODE:-modular}
      REDIS_URL: ${REDIS_URL}
      ENABLE_AGENT_SKILLS: ${ENABLE_AGENT_SKILLS:-false}
      ENABLE_LIBRECHAT: ${ENABLE_LIBRECHAT:-false}
      ENABLE_LANGCHAIN: ${ENABLE_LANGCHAIN:-true}
      ENABLE_NANGO: ${ENABLE_NANGO:-false}
      ENABLE_QUANTDINGER: ${ENABLE_QUANTDINGER:-false}
      ENABLE_UNDERSTAND_ANYTHING: ${ENABLE_UNDERSTAND_ANYTHING:-false}
      FCX_RISK_MODE: ${FCX_RISK_MODE:-conservative}
    depends_on:
      redis:
        condition: service_healthy
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - fcx_backend

  grafana:
    image: grafana/grafana:11.1.3
    container_name: fcx-production-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL}
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: alertingSimplifiedRouting
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - grafana_production_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      postgres:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grafana cli admin stats >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - fcx_backend
      - fcx_public

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: fcx-production-prometheus
    restart: unless-stopped
    environment:
      EMQX_DASHBOARD_USER: ${EMQX_DASHBOARD_USER}
      EMQX_DASHBOARD_PASSWORD: ${EMQX_DASHBOARD_PASSWORD}
    command:
      - /bin/sh
      - -c
      - 'sed "s|\$${EMQX_DASHBOARD_USER}|$${EMQX_DASHBOARD_USER}|g; s|\$${EMQX_DASHBOARD_PASSWORD}|$${EMQX_DASHBOARD_PASSWORD}|g" /etc/prometheus/prometheus.yml > /tmp/prometheus.yml && /bin/prometheus --config.file=/tmp/prometheus.yml --storage.tsdb.path=/prometheus --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d} --web.enable-lifecycle'
    volumes:
      - prometheus_production_data:/prometheus
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
    depends_on:
      backend:
        condition: service_healthy
      postgres-exporter:
        condition: service_started
      redis-exporter:
        condition: service_started
      node-exporter:
        condition: service_started
      cadvisor:
        condition: service_started
      blackbox-exporter:
        condition: service_started
      alertmanager:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - fcx_backend
      - fcx_public

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: fcx-production-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - alertmanager_production_data:/alertmanager
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    depends_on:
      whatsapp-alerts:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - fcx_backend

  loki:
    image: grafana/loki:3.1.1
    container_name: fcx-production-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - loki_production_data:/loki
      - ./observability/loki/loki.yml:/etc/loki/loki.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - fcx_backend

  promtail:
    image: grafana/promtail:3.1.1
    container_name: fcx-production-promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/promtail.yml"]
    volumes:
      - ./observability/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - fcx_backend

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: fcx-production-node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /:/host:ro,rslave
    pid: host
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - fcx_backend

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: fcx-production-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    logging: *default-logging
    networks:
      - fcx_backend

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: fcx-production-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_URI: postgres:5432/${POSTGRES_DB}?sslmode=disable
      DATA_SOURCE_USER: ${POSTGRES_USER}
      DATA_SOURCE_PASS: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - fcx_backend

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: fcx-production-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - fcx_backend

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: fcx-production-blackbox-exporter
    restart: unless-stopped
    command: ["--config.file=/etc/blackbox_exporter/config.yml"]
    volumes:
      - ./observability/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - fcx_backend

  whatsapp-alerts:
    build:
      context: ./observability/whatsapp-webhook
      dockerfile: Dockerfile
    container_name: fcx-production-whatsapp-alerts
    restart: unless-stopped
    environment:
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_TO: ${WHATSAPP_TO:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - fcx_backend

  nginx:
    image: nginx:1.27-alpine
    container_name: fcx-production-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - letsencrypt_certs:/etc/letsencrypt
      - letsencrypt_webroot:/var/www/certbot
      - nginx_production_logs:/var/log/nginx
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      grafana:
        condition: service_healthy
      emqx:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - fcx_public

  certbot:
    image: certbot/certbot:v2.11.0
    container_name: fcx-production-certbot
    profiles: ["ssl"]
    volumes:
      - letsencrypt_certs:/etc/letsencrypt
      - letsencrypt_webroot:/var/www/certbot
    command: certonly --webroot --webroot-path=/var/www/certbot --cert-name fcx-production --email ${LETSENCRYPT_EMAIL} --agree-tos --no-eff-email --force-renewal -d ${APP_DOMAIN} -d ${API_DOMAIN} -d ${GRAFANA_DOMAIN} -d ${MQTT_DASHBOARD_DOMAIN}
    networks:
      - fcx_public

volumes:
  postgres_production_data:
  redis_production_data:
  emqx_production_data:
  emqx_production_log:
  grafana_production_data:
  letsencrypt_certs:
  letsencrypt_webroot:
  nginx_production_logs:
  prometheus_production_data:
  alertmanager_production_data:
  loki_production_data:

networks:
  fcx_backend:
    driver: bridge
    internal: true
  fcx_public:
    driver: bridge
