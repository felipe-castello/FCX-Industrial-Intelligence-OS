global:
  resolve_timeout: 5m

route:
  receiver: whatsapp
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h

receivers:
  - name: whatsapp
    webhook_configs:
      - url: http://whatsapp-alerts:8080/alertmanager
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity=~"high|medium|low"
    equal: ["service"]
