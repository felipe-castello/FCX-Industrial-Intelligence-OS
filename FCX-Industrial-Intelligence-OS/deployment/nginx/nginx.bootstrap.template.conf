events {
  worker_connections 1024;
}

http {
  server_tokens off;
  client_max_body_size 20m;

  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log warn;

  upstream fcx_frontend {
    server frontend:80;
  }

  upstream fcx_backend {
    server backend:3000;
  }

  upstream fcx_grafana {
    server grafana:3000;
  }

  upstream fcx_emqx_dashboard {
    server emqx:18083;
  }

  server {
    listen 80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location /health {
      access_log off;
      return 200 "ok\n";
    }
  }

  server {
    listen 80;
    server_name __APP_DOMAIN__;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      proxy_pass http://fcx_frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    listen 80;
    server_name __API_DOMAIN__;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      proxy_pass http://fcx_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    listen 80;
    server_name __GRAFANA_DOMAIN__;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      proxy_pass http://fcx_grafana;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    listen 80;
    server_name __MQTT_DASHBOARD_DOMAIN__;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      proxy_pass http://fcx_emqx_dashboard;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
