events {
  worker_connections 1024;
}

http {
  server_tokens off;
  client_max_body_size 20m;

  log_format fcx_json escape=json
    '{"time":"$time_iso8601","remote_addr":"$remote_addr","host":"$host","request":"$request",'
    '"status":$status,"body_bytes_sent":$body_bytes_sent,"request_time":$request_time,'
    '"upstream_response_time":"$upstream_response_time","http_user_agent":"$http_user_agent"}';

  access_log /var/log/nginx/access.log fcx_json;
  error_log /var/log/nginx/error.log warn;

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  upstream fcx_frontend {
    server frontend:80;
  }

  upstream fcx_backend {
    server backend:3000;
  }

  upstream fcx_grafana {
    server grafana:3000;
  }

  upstream fcx_emqx_dashboard {
    server emqx:18083;
  }

  server {
    listen 80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location /health {
      access_log off;
      return 200 "ok\n";
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl http2;
    server_name __APP_DOMAIN__;

    ssl_certificate /etc/letsencrypt/live/fcx-production/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fcx-production/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:FCXSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
      proxy_pass http://fcx_frontend;
    }
  }

  server {
    listen 443 ssl http2;
    server_name __API_DOMAIN__;

    ssl_certificate /etc/letsencrypt/live/fcx-production/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fcx-production/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:FCXSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
      limit_req zone=api_limit burst=30 nodelay;
      proxy_pass http://fcx_backend;
    }
  }

  server {
    listen 443 ssl http2;
    server_name __GRAFANA_DOMAIN__;

    ssl_certificate /etc/letsencrypt/live/fcx-production/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fcx-production/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:FCXSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_pass http://fcx_grafana;
    }
  }

  server {
    listen 443 ssl http2;
    server_name __MQTT_DASHBOARD_DOMAIN__;

    ssl_certificate /etc/letsencrypt/live/fcx-production/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fcx-production/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:FCXSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_pass http://fcx_emqx_dashboard;
    }
  }
}
